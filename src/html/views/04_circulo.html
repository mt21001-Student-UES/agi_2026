<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Algoritmos Gráficos</title>
    <link rel="stylesheet" type="text/css" href="css/canvasDisplay.css" />
  </head>
  <body>
    <nav>
      <a href="../../index.html">Regresar</a>
    </nav>

    <div class="layout">
      <!-- Columna izquierda -->
      <div class="controls">
        <fieldset>
          <legend>Resolución</legend>
          <div class="form-row">
            <label for="inputResolucionLinea">Linea</label>
            <input id="inputResolucionLinea" type="number" value="100" />
          </div>
          <div class="form-row">
            <label for="inputResolucionCirculo">Circulo</label>
            <input id="inputResolucionCirculo" type="number" value="10" />
          </div>
          <div class="form-row">
            <label for="inputRadioCirculo">Radio</label>
            <input
              id="inputRadioCirculo"
              type="number"
              value="0.5"
              step="0.01"
            />
          </div>
          <button id="btnActualizarCirculo">Actualizar Círculo</button>
        </fieldset>
        <fieldset>
          <legend>Cambiar Colores</legend>
          <div class="form-row">
            <label for="btnColorFondo">Color del Fondo</label>
            <input type="color" id="btnColorFondo" value="#000000" />
          </div>
          <div class="form-row">
            <label for="btnColorPunto">Color del Punto</label>
            <input type="color" id="btnColorPunto" value="#ffffff" />
          </div>
          <div class="form-row">
            <label for="tamañoPunto">Tamaño Punto</label>
            <input
              type="number"
              id="tamañoPunto"
              min="0"
              max="100"
              step="1"
              value="5"
            />
          </div>
          <input type="button" value="Limpiar Canvas" id="btnLimpiarCanvas" />
        </fieldset>

        <fieldset>
          <legend>Tamaño del Canvas</legend>
          <div class="form-row">
            <label for="inputAncho">Ancho</label>
            <input id="inputAncho" type="number" value="500" />
          </div>
          <div class="form-row">
            <label for="inputAlto">Alto</label>
            <input id="inputAlto" type="number" value="500" />
          </div>
          <button id="btnActualizarDimensiones">Actualizar Canvas</button>
        </fieldset>
      </div>

      <!-- Columna derecha -->
      <div class="canvas-container">
        <canvas id="canvas" height="500" width="500"></canvas>
      </div>
    </div>

    <script type="module" src="/js/boundary/04_circulo.js"></script>
  </body>
</html>
