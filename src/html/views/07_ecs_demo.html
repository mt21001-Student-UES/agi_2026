<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECS Demo — Círculo en movimiento</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d0d14;
      color: #e0e0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #7c6aff, #3ecfff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: .4rem;
      font-size: .85rem;
      color: #888;
    }

    /* ── Canvas ───────────────────────────────────────────────── */
    #canvas-wrapper {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(124, 106, 255, 0.25),
        0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    canvas {
      display: block;
    }

    /* ── Controles ────────────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .control-group {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: .8rem 1.2rem;
      display: flex;
      align-items: center;
      gap: .7rem;
      font-size: .83rem;
    }

    .control-group label {
      color: #999;
    }

    .control-group input[type=range] {
      width: 120px;
      accent-color: #7c6aff;
    }

    .control-group span {
      min-width: 2.5rem;
      text-align: right;
      color: #ccc;
      font-variant-numeric: tabular-nums;
    }

    button {
      padding: .5rem 1.2rem;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #7c6aff, #3ecfff);
      color: #fff;
      font-weight: 600;
      font-size: .85rem;
      cursor: pointer;
      transition: opacity .2s;
    }

    button:hover {
      opacity: .85;
    }

    /* ── Info chips ───────────────────────────────────────────── */
    .chips {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .chip {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 999px;
      padding: .25rem .8rem;
      font-size: .75rem;
      color: #aaa;
    }

    .chip span {
      color: #7c6aff;
      font-weight: 600;
    }

    /* ── Back link ────────────────────────────────────────────── */
    a.back {
      font-size: .8rem;
      color: #666;
      text-decoration: none;
      transition: color .2s;
    }

    a.back:hover {
      color: #aaa;
    }
  </style>
</head>

<body>

  <header>
    <h1>ECS Demo — Motor WebGL</h1>
    <p>Arquitectura Entity-Component-System · Motor.js + Escena + SistemaRender</p>
  </header>

  <!-- Canvas principal -->
  <div id="canvas-wrapper">
    <canvas id="canvas" width="600" height="600"></canvas>
  </div>

  <!-- Controles en tiempo real -->
  <div class="controls">

    <div class="control-group">
      <label for="sliderRadio">Radio</label>
      <input id="sliderRadio" type="range" min="0.05" max="0.45" step="0.01" value="0.2" />
      <span id="valRadio">0.20</span>
    </div>

    <div class="control-group">
      <label for="sliderDef">Definición</label>
      <input id="sliderDef" type="range" min="5" max="200" step="1" value="60" />
      <span id="valDef">60</span>
    </div>

    <div class="control-group">
      <label for="sliderVel">Velocidad</label>
      <input id="sliderVel" type="range" min="0.1" max="3" step="0.05" value="0.6" />
      <span id="valVel">0.60</span>
    </div>

    <div class="control-group">
      <label for="sliderPunto">Punto px</label>
      <input id="sliderPunto" type="range" min="1" max="12" step="1" value="4" />
      <span id="valPunto">4</span>
    </div>

    <div class="control-group">
      <label for="colorCirculo">Color</label>
      <input id="colorCirculo" type="color" value="#7c6aff" />
    </div>

    <button id="btnOctantes">½ círculo</button>
    <button id="btnPausar">⏸ Pausar</button>

  </div>

  <!-- Chips de estado -->
  <div class="chips">
    <div class="chip">Motor: <span id="chipMotor">corriendo</span></div>
    <div class="chip">Entidades: <span id="chipEntidades">0</span></div>
    <div class="chip">Octantes: <span id="chipOctantes">8/8</span></div>
    <div class="chip">FPS: <span id="chipFPS">—</span></div>
  </div>

  <a class="back" href="../../index.html">← Volver al inicio</a>

  <!-- ═══════════════════════════════════════════════════════════════════
         Script principal — instancia toda la arquitectura ECS
         Las rutas son relativas a src/html/views/
    ════════════════════════════════════════════════════════════════════ -->
  <script type="module">
    // ── Importaciones de la nueva arquitectura ─────────────────────────
    import Motor from '/js/core/Motor.js';
    import Escena from '/js/core/Escena.js';
    import ModeloWebGL from '/js/graficos/ModeloWebGL.js';
    import SistemaRender from '/js/sistemas/SistemaRender.js';
    import CirculoFactory from '/js/ecs/factories/CirculoFactory.js';
    import { FisicaComponent } from '/js/ecs/Componentes.js';

    // ── 1. Canvas y WebGL ──────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const webgl = new ModeloWebGL(canvas, { colorFondo: '#0d0d14' });

    // ── 2. Escena (gestor de entidades) ────────────────────────────────
    const escena = new Escena();

    // ── 3. Crear la entidad "Círculo" con la factory ───────────────────
    //    - La factory crea la entidad, añade GeometriaComponent (con Circulo)
    //    - Le añadimos Transform, Fisica y Render mediante el builder fluente
    const factoryCirculo = new CirculoFactory(escena, {
      h: 0, k: 0,         // centro inicial en (0,0) NDC
      r: 0.2,             // radio
      definicion: 60,     // puntos por octante
      color: [0.486, 0.416, 1.0],  // #7c6aff
    });

    const circulo = factoryCirculo
      .conTransform(-0.8, 0)    // posición inicial: borde izquierdo
      .conFisica(0.6, 0)        // velocidad inicial: moviéndose a la derecha
      .conRender('puntos', 4, 0)
      .construir();

    // Referencia a la figura para poder cambiar radio/color después
    const figuraCirculo = factoryCirculo.figura;

    // ── 4. Sistema de Render ───────────────────────────────────────────
    const sistemaRender = new SistemaRender(webgl, escena);

    // ── 5. Sistema de movimiento (inline, pequeño) ─────────────────────
    //    En una app real esto sería SistemaFisicas.js completo.
    //    Aquí lo hacemos inline para mantener el demo auto-contenido.
    const sistemaMovimiento = {
      update(deltaTime) {
        const { transform, fisica } = circulo;
        if (!transform || !fisica) return;

        // Mover en X según velocidad
        transform.x += fisica.velocidadX * deltaTime;

        // Rebotar en los bordes NDC (−1 a +1) considerando el radio
        const radioNDC = circulo.geometria.figura.r ?? 0.2;  // acceso al radio
        const borde = 1.0 - radioNDC * 0.5;
        if (transform.x > borde) {
          transform.x = borde;
          fisica.velocidadX *= -1;
        }
        if (transform.x < -borde) {
          transform.x = -borde;
          fisica.velocidadX *= -1;
        }
      }
    };

    // ── 6. Registrar sistemas en la Escena ────────────────────────────
    //    Orden: movimiento → render
    escena.agregarSistema(sistemaMovimiento);
    escena.agregarSistema(sistemaRender);

    // ── 7. Motor: arranca el game loop ────────────────────────────────
    const motor = new Motor();
    motor.agregarSistema(escena);   // La Escena orquesta sus propios sistemas
    motor.iniciar();

    // Actualizar chips de estado
    document.getElementById('chipEntidades').textContent = escena.totalEntidades;

    // ── 8. FPS counter ─────────────────────────────────────────────────
    let frames = 0, lastFPS = performance.now();
    const chipFPS = document.getElementById('chipFPS');
    setInterval(() => {
      const now = performance.now();
      chipFPS.textContent = Math.round(frames * 1000 / (now - lastFPS));
      frames = 0; lastFPS = now;
    }, 1000);
    // Inyectar contador en la escena (pequeño hack de demo)
    const _upOrig = escena.update.bind(escena);
    // No podemos sobreescribir métodos privados, usamos el motor directamente
    // Motor ya llama a escena.update(), así que contamos desde el sistemaRender
    const _srOrig = sistemaRender.update.bind(sistemaRender);
    sistemaRender.update = (dt) => { frames++; _srOrig(dt); };

    // ── 9. Controles en tiempo real ────────────────────────────────────

    // Radio
    const sliderRadio = document.getElementById('sliderRadio');
    const valRadio = document.getElementById('valRadio');
    sliderRadio.addEventListener('input', () => {
      const r = parseFloat(sliderRadio.value);
      valRadio.textContent = r.toFixed(2);
      // Recrear la figura Circulo con el nuevo radio
      // (el radio está guardado en la figura interna)
      figuraCirculo.r = r;   // acceso directo al campo privado simulado
      // Como Circulo usa this.#r (privado), tenemos que recrear via factory
      // En su lugar, cambiamos a un enfoque: la figura recalcula si le cambian el radio
      // Por ahora marcamos sucio para que se recalcule con los mismos params
      // NOTA: En Circulo.js #r es privado; aquí demo simplificado:
      //circulo.geometria.figura.#r = r; // ← Esto lanzaría error (campo privado)
      // Demo correcto: La CirculoFactory expone un método para reconstruir
      // En producción se añadiría setRadio() a Circulo.js
      circulo.geometria.figura.setRadio(r);
      circulo.geometria.marcarSucio();
    });

    // Definición (puntos por octante)
    const sliderDef = document.getElementById('sliderDef');
    const valDef = document.getElementById('valDef');
    sliderDef.addEventListener('input', () => {
      valDef.textContent = sliderDef.value;
      circulo.geometria.marcarSucio();
    });

    // Velocidad
    const sliderVel = document.getElementById('sliderVel');
    const valVel = document.getElementById('valVel');
    sliderVel.addEventListener('input', () => {
      const v = parseFloat(sliderVel.value);
      valVel.textContent = v.toFixed(2);
      // Mantener la dirección actual (signo de velocidadX)
      const dir = Math.sign(circulo.fisica.velocidadX) || 1;
      circulo.fisica.velocidadX = dir * v;
    });

    // Tamaño del punto
    const sliderPunto = document.getElementById('sliderPunto');
    const valPunto = document.getElementById('valPunto');
    sliderPunto.addEventListener('input', () => {
      valPunto.textContent = sliderPunto.value;
      circulo.render.tamañoPunto = parseInt(sliderPunto.value);
    });

    // Color
    const colorPicker = document.getElementById('colorCirculo');
    colorPicker.addEventListener('input', () => {
      const hex = colorPicker.value;
      const r = parseInt(hex.slice(1, 3), 16) / 255;
      const g = parseInt(hex.slice(3, 5), 16) / 255;
      const b = parseInt(hex.slice(5, 7), 16) / 255;
      factoryCirculo.conColor(r, g, b);
    });

    // Octantes — alternar entre círculo completo y medio círculo
    let medioCirculo = false;
    const btnOctantes = document.getElementById('btnOctantes');
    const chipOctantes = document.getElementById('chipOctantes');
    btnOctantes.addEventListener('click', () => {
      medioCirculo = !medioCirculo;
      const mask = medioCirculo
        ? [true, true, true, true, false, false, false, false]
        : [true, true, true, true, true, true, true, true];
      factoryCirculo.conOctantes(mask);
      chipOctantes.textContent = medioCirculo ? '4/8' : '8/8';
      btnOctantes.textContent = medioCirculo ? 'Círculo completo' : '½ círculo';
    });

    // Pausar / reanudar
    let pausado = false;
    const btnPausar = document.getElementById('btnPausar');
    const chipMotor = document.getElementById('chipMotor');
    btnPausar.addEventListener('click', () => {
      pausado = !pausado;
      if (pausado) {
        motor.detener();
        btnPausar.textContent = '▶ Reanudar';
        chipMotor.textContent = 'pausado';
      } else {
        motor.iniciar();
        btnPausar.textContent = '⏸ Pausar';
        chipMotor.textContent = 'corriendo';
      }
    });
  </script>
</body>

</html>
